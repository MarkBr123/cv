<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Brizuela - CV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
        }

        header {
            background: #111827;
            color: white;
            padding: 25px 15px;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            padding: 30px 20px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            max-width: 400px;
            padding: 15px;
            margin: 10px auto;
            font-size: 16px;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s ease;
        }

        .view-btn {
            background: #2563eb;
            color: white;
        }

        .view-btn:hover {
            background: #1e40af;
        }

        .download-btn {
            background: #10b981;
            color: white;
        }

        .download-btn:hover {
            background: #047857;
        }

        /* Desktop PDF view */
        .pdf-viewer {
            display: none;
            width: 90%;
            max-width: 900px;
            height: 90vh;
            margin: 20px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Show embedded PDF only on bigger screens */
        @media (min-width: 768px) {
            .pdf-viewer {
                display: block;
            }
        }
    </style>
</head>
<body>

<header>
    Mark Brizuela - Curriculum Vitae
</header>

<div class="container">
    <a href="Mark Brizuela Resume.pdf" target="_blank" class="btn view-btn">
        View CV
    </a>

    <a href="Mark Brizuela Resume.pdf" download class="btn download-btn">
        Download CV
    </a>
</div>

<div class="pdf-viewer">
    <iframe src="Mark Brizuela Resume.pdf"></iframe>
</div>

</body>
</html>
