<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Brizuela - CV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: #111827;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .pdf-container {
            width: 90%;
            max-width: 900px;
            margin: 20px auto;
            height: 90vh;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .download-btn {
            margin-bottom: 30px;
        }

        .download-btn a {
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .download-btn a:hover {
            background: #1e40af;
        }
    </style>
</head>
<body>

<header>
    Mark Brizuela - Curriculum Vitae
</header>

<div class="pdf-container">
    <iframe src="Mark Brizuela Resume.pdf"></iframe>
</div>

<div class="download-btn">
    <a href="Mark Brizuela Resume.pdf" download>Download CV</a>
</div>

</body>
</html>
