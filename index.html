<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Brizuela - Professional Documents</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
        }

        header {
            background: #111827;
            color: white;
            padding: 25px 15px;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            padding: 30px 20px;
        }

        .section-title {
            margin-top: 40px;
            font-size: 20px;
            font-weight: bold;
        }

        .btn {
            display: block;
            width: 100%;
            max-width: 400px;
            padding: 15px;
            margin: 10px auto;
            font-size: 16px;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s ease;
            color: white;
        }

        .cv-btn {
            background: #2563eb;
        }

        .cv-btn:hover {
            background: #1e40af;
        }

        .card-btn {
            background: #f59e0b;
        }

        .card-btn:hover {
            background: #b45309;
        }

        .pdf-viewer {
            display: none;
            width: 90%;
            max-width: 900px;
            height: 90vh;
            margin: 20px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (min-width: 768px) {
            .pdf-viewer {
                display: block;
            }
        }
    </style>
</head>
<body>

<header>
    Mark Brizuela - Professional Documents
</header>

<div class="container">

    <div class="section-title">Curriculum Vitae</div>

    <a href="MarkCVRef.pdf" target="_blank" class="btn cv-btn">
        View CV
    </a>

    <a href="MarkCVRef.pdf" download class="btn cv-btn">
        Download CV
    </a>

    <div class="section-title">Calling Card</div>

    <a href="Callingcard.pdf" target="_blank" class="btn card-btn">
        View Calling Card
    </a>

    <a href="Callingcard.pdf" download class="btn card-btn">
        Download Calling Card
    </a>

</div>

<div class="pdf-viewer">
    <iframe src="MarkCVRef.pdf"></iframe>
</div>

<div class="pdf-viewer">
    <iframe src="Callingcard.pdf"></iframe>
</div>

</body>
</html>
